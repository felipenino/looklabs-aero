<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#F7F8FA"/>
  <!-- Navy jacket silhouette -->
  <!-- Body -->
  <polygon points="140,95 115,130 85,118 80,170 135,155 130,290 270,290 265,155 320,170 315,118 285,130 260,95" fill="#1E3A5F" stroke="#152C4A" stroke-width="2"/>
  <!-- Collar -->
  <polygon points="155,90 175,80 200,88 225,80 245,90 235,110 200,100 165,110" fill="#152C4A" stroke="#0F1F33" stroke-width="1.5"/>
  <!-- Center zip -->
  <line x1="200" y1="100" x2="200" y2="290" stroke="#374151" stroke-width="2"/>
  <!-- Zip teeth -->
  <line x1="197" y1="120" x2="203" y2="120" stroke="#6B7280" stroke-width="1"/>
  <line x1="197" y1="140" x2="203" y2="140" stroke="#6B7280" stroke-width="1"/>
  <line x1="197" y1="160" x2="203" y2="160" stroke="#6B7280" stroke-width="1"/>
  <line x1="197" y1="180" x2="203" y2="180" stroke="#6B7280" stroke-width="1"/>
  <line x1="197" y1="200" x2="203" y2="200" stroke="#6B7280" stroke-width="1"/>
  <!-- Pockets -->
  <rect x="145" y="200" width="45" height="35" rx="2" fill="none" stroke="#152C4A" stroke-width="1.5"/>
  <rect x="210" y="200" width="45" height="35" rx="2" fill="none" stroke="#152C4A" stroke-width="1.5"/>

</svg>
