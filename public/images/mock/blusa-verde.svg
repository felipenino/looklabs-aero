<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#F7F8FA"/>
  <!-- Green blouse silhouette -->
  <!-- Body with slightly flared shape -->
  <polygon points="145,100 120,130 90,120 85,165 140,152 135,285 265,285 260,152 315,165 310,120 280,130 255,100" fill="#34D399" stroke="#10B981" stroke-width="2"/>
