<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#F7F8FA"/>
  <!-- Black pants silhouette -->
  <!-- Waistband -->
  <rect x="120" y="60" width="160" height="20" rx="3" fill="#1F2937" stroke="#111827" stroke-width="2"/>
  <!-- Left leg -->
  <polygon points="120,80 130,80 138,320 195,320 200,80" fill="#1F2937" stroke="#111827" stroke-width="2"/>
  <!-- Right leg -->
  <polygon points="200,80 205,320 262,320 270,80 280,80" fill="#1F2937" stroke="#111827" stroke-width="2"/>
  <!-- Fly line -->
  <line x1="200" y1="80" x2="200" y2="155" stroke="#374151" stroke-width="1.5"/>
  <!-- Crease lines -->
  <line x1="167" y1="120" x2="165" y2="300" stroke="#374151" stroke-width="0.8" opacity="0.5"/>
  <line x1="233" y1="120" x2="235" y2="300" stroke="#374151" stroke-width="0.8" opacity="0.5"/>

</svg>
