<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#F7F8FA"/>
  <!-- T-shirt silhouette -->
  <polygon points="140,100 120,130 90,120 90,160 140,150 140,280 260,280 260,150 310,160 310,120 280,130 260,100" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
  <!-- Neckline -->
  <ellipse cx="200" cy="100" rx="30" ry="10" fill="#F7F8FA" stroke="#D1D5DB" stroke-width="2"/>
  <!-- Sleeve lines -->
  <line x1="140" y1="150" x2="90" y2="160" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="260" y1="150" x2="310" y2="160" stroke="#E5E7EB" stroke-width="1"/>

</svg>
