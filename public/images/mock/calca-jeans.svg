<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#F7F8FA"/>
  <!-- Jeans silhouette -->
  <!-- Waistband -->
  <rect x="120" y="60" width="160" height="20" rx="3" fill="#4471AA" stroke="#3B5F8A" stroke-width="2"/>
  <!-- Left leg -->
  <polygon points="120,80 130,80 140,320 195,320 200,80 200,80" fill="#4B7BBF" stroke="#3B5F8A" stroke-width="2"/>
  <!-- Right leg -->
  <polygon points="200,80 200,80 205,320 260,320 270,80 280,80" fill="#4B7BBF" stroke="#3B5F8A" stroke-width="2"/>
  <!-- Fly line -->
  <line x1="200" y1="80" x2="200" y2="160" stroke="#3B5F8A" stroke-width="1.5"/>
  <!-- Pocket curves -->
  <path d="M135,85 Q155,100 135,115" fill="none" stroke="#3B5F8A" stroke-width="1.5"/>
  <path d="M265,85 Q245,100 265,115" fill="none" stroke="#3B5F8A" stroke-width="1.5"/>

</svg>
